modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

# Optional: link to your issue tracker
issueTrackerURL = "https://github.com/kuko010/TinyFisch/Issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
credits = "See source code and NOTICE.md"
displayURL = "https://github.com/kuko010/TinyFisch"   # <-- add this line
description = '''${mod_description}'''

# Mixin configuration – only needed if you use mixins
[[mixins]]
config = "${mod_id}.mixins.json"

# Access transformer (optional)
# [[accessTransformers]]
# file = "META-INF/accesstransformer.cfg"

# Dependencies
[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

# Example feature requirement (e.g., OpenGL version)
# [features.${mod_id}]
# openGLVersion = "[3.2,)"